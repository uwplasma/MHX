name: Docs

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  sphinx:
    name: Sphinx warnings-as-errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: python -m pip install -e ".[docs]"
      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html
      - name: Upload docs HTML
        uses: actions/upload-artifact@v4
        with:
          name: mhx-docs-html
          path: docs/_build/html
