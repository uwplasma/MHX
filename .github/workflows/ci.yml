name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      JAX_PLATFORM_NAME: cpu
      JAX_ENABLE_X64: "1"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: |
          python -m ruff check src tests examples tools
      - name: Legacy import guard
        run: |
          python tools/check_legacy_imports.py
      - name: Tests
        run: |
          python -m pytest --cov=mhx --cov-report=term-missing --cov-fail-under=95

  docs:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORM_NAME: cpu
      JAX_ENABLE_X64: "1"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"
      - name: Build docs
        run: |
          sphinx-build -b html docs docs/_build/html

  benchmark-artifacts:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORM_NAME: cpu
      JAX_ENABLE_X64: "1"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Generate FAST benchmark artifacts
        run: |
          mhx benchmark run --config examples/linear_tearing.toml --outdir outputs/ci/linear_tearing_fast --gif
          mhx benchmark validate outputs/ci/linear_tearing_fast
          mhx benchmark decay --outdir outputs/ci/resistive_decay
          mhx benchmark scaling --outdir outputs/ci/reconnection_scaling
          mhx benchmark fkr-window --outdir outputs/ci/fkr_window
          mhx benchmark fkr-growth --outdir outputs/ci/fkr_growth_rate
          mhx benchmark harris-delta-prime --outdir outputs/ci/harris_delta_prime
          mhx benchmark linear-tearing-eigenvalue --outdir outputs/ci/linear_tearing_eigenvalue
          mhx benchmark linear-tearing-dispersion --outdir outputs/ci/linear_tearing_dispersion
          mhx benchmark linear-tearing-layer --outdir outputs/ci/linear_tearing_layer
          mhx benchmark linear-tearing-timedomain --outdir outputs/ci/linear_tearing_timedomain
          mhx benchmark linearized-rhs --outdir outputs/ci/linearized_rhs
          mhx benchmark reduced-mhd-eigenmode --outdir outputs/ci/reduced_mhd_eigenmode
          mhx benchmark cosine-equilibrium-linearization --outdir outputs/ci/cosine_equilibrium_linearization
          mhx benchmark current-sheet-eigenvalue --outdir outputs/ci/periodic_current_sheet_eigenvalue
          mhx benchmark current-sheet-timedomain --outdir outputs/ci/periodic_current_sheet_timedomain
          mhx benchmark current-sheet-nonlinear-bridge --outdir outputs/ci/periodic_current_sheet_nonlinear_bridge
          mhx benchmark diffusion-eigenvalue --outdir outputs/ci/diffusion_eigenvalue
          mhx benchmark power-iteration --outdir outputs/ci/power_iteration
          mhx benchmark arnoldi --outdir outputs/ci/arnoldi
          mhx benchmark timing --outdir outputs/ci/timing --repeats 1 --warmups 0
          mhx benchmark catalog --outdir outputs/ci/catalog
          mhx validate all --outdir outputs/ci/validation_suite
          python examples/make_readme_media.py
          mhx run examples/linear_tearing_twofluid_toy.toml --outdir outputs/ci/twofluid_toy
          mhx figures outputs/ci/twofluid_toy --gif
          mhx report outputs/ci/twofluid_toy
          mhx run examples/linear_tearing_plugin_demo.toml --outdir outputs/ci/plugin_demo
          mhx figures outputs/ci/plugin_demo --gif
          test -f outputs/ci/plugin_demo/figures/diagnostics/final_flux_l2_history.png
          mhx report outputs/ci/plugin_demo
          mhx artifact-manifest outputs/ci
      - name: Validate artifact file set
        run: |
          test -f outputs/ci/artifact_manifest.json
          test -f outputs/ci/linear_tearing_fast/manifest.json
          test -f outputs/ci/linear_tearing_fast/validation.json
          test -f outputs/ci/linear_tearing_fast/report.md
          test -f outputs/ci/linear_tearing_fast/figures/energy_history.png
          test -f outputs/ci/linear_tearing_fast/figures/flux_movie.gif
          test -f outputs/ci/resistive_decay/validation.json
          test -f outputs/ci/resistive_decay/figures/decay_amplitude.png
          test -f outputs/ci/resistive_decay/figures/decay_energy.png
          test -f outputs/ci/resistive_decay/figures/decay_relative_error.png
          test -f outputs/ci/reconnection_scaling/validation.json
          test -f outputs/ci/reconnection_scaling/figures/fkr_scaling.png
          test -f outputs/ci/reconnection_scaling/figures/plasmoid_scaling.png
          test -f outputs/ci/reconnection_scaling/figures/ideal_tearing_scaling.png
          test -f outputs/ci/fkr_window/validation.json
          test -f outputs/ci/fkr_window/figures/fkr_constant_psi_window.png
          test -f outputs/ci/fkr_growth_rate/validation.json
          test -f outputs/ci/fkr_growth_rate/figures/fkr_growth_rate.png
          test -f outputs/ci/harris_delta_prime/validation.json
          test -f outputs/ci/harris_delta_prime/figures/harris_delta_prime.png
          test -f outputs/ci/linear_tearing_eigenvalue/validation.json
          test -f outputs/ci/linear_tearing_eigenvalue/figures/linear_tearing_eigenvalue.png
          test -f outputs/ci/linear_tearing_dispersion/validation.json
          test -f outputs/ci/linear_tearing_dispersion/figures/linear_tearing_dispersion.png
          test -f outputs/ci/linear_tearing_layer/validation.json
          test -f outputs/ci/linear_tearing_layer/figures/linear_tearing_layer.png
          test -f outputs/ci/linear_tearing_timedomain/validation.json
          test -f outputs/ci/linear_tearing_timedomain/figures/linear_tearing_timedomain.png
          test -f outputs/ci/linearized_rhs/validation.json
          test -f outputs/ci/linearized_rhs/figures/linearized_rhs_errors.png
          test -f outputs/ci/reduced_mhd_eigenmode/validation.json
          test -f outputs/ci/reduced_mhd_eigenmode/figures/reduced_mhd_linear_eigenmode_errors.png
          test -f outputs/ci/cosine_equilibrium_linearization/validation.json
          test -f outputs/ci/cosine_equilibrium_linearization/figures/cosine_equilibrium_linearization_errors.png
          test -f outputs/ci/periodic_current_sheet_eigenvalue/validation.json
          test -f outputs/ci/periodic_current_sheet_eigenvalue/figures/periodic_current_sheet_spectrum.png
          test -f outputs/ci/periodic_current_sheet_timedomain/validation.json
          test -f outputs/ci/periodic_current_sheet_timedomain/figures/periodic_current_sheet_timedomain.png
          test -f outputs/ci/periodic_current_sheet_nonlinear_bridge/validation.json
          test -f outputs/ci/periodic_current_sheet_nonlinear_bridge/figures/periodic_current_sheet_nonlinear_bridge.png
          test -f outputs/ci/diffusion_eigenvalue/validation.json
          test -f outputs/ci/diffusion_eigenvalue/figures/diffusion_eigenvalue_errors.png
          test -f outputs/ci/power_iteration/validation.json
          test -f outputs/ci/power_iteration/figures/power_iteration_history.png
          test -f outputs/ci/arnoldi/validation.json
          test -f outputs/ci/arnoldi/figures/arnoldi_ritz_values.png
          test -f outputs/ci/timing/timing.json
          test -f outputs/ci/timing/timing.md
          test -f outputs/ci/timing/figures/timing_summary.png
          test -f outputs/ci/catalog/benchmark_catalog.json
          test -f outputs/ci/catalog/benchmark_catalog.md
          test -f outputs/ci/validation_suite/validation_suite.json
          test -f outputs/ci/validation_suite/validation_suite.md
          test -f outputs/ci/validation_suite/fkr_growth_rate/figures/fkr_growth_rate.png
          test -f outputs/ci/validation_suite/harris_delta_prime/figures/harris_delta_prime.png
          test -f outputs/ci/validation_suite/linear_tearing_eigenvalue/figures/linear_tearing_eigenvalue.png
          test -f outputs/ci/validation_suite/linear_tearing_dispersion/figures/linear_tearing_dispersion.png
          test -f outputs/ci/validation_suite/linear_tearing_layer/figures/linear_tearing_layer.png
          test -f outputs/ci/validation_suite/linear_tearing_timedomain/figures/linear_tearing_timedomain.png
          test -f outputs/ci/validation_suite/cosine_equilibrium_linearization/figures/cosine_equilibrium_linearization_errors.png
          test -f outputs/ci/validation_suite/periodic_current_sheet_eigenvalue/figures/periodic_current_sheet_spectrum.png
          test -f outputs/ci/validation_suite/periodic_current_sheet_timedomain/figures/periodic_current_sheet_timedomain.png
          test -f outputs/ci/validation_suite/periodic_current_sheet_nonlinear_bridge/figures/periodic_current_sheet_nonlinear_bridge.png
          test -f docs/_static/readme/harris_layer_sweep.gif
          test -f docs/_static/readme/plasmoid_scaling_schematic.gif
          test "$(stat -c%s docs/_static/readme/harris_layer_sweep.gif)" -lt 200000
          test "$(stat -c%s docs/_static/readme/plasmoid_scaling_schematic.gif)" -lt 300000
          test -f outputs/ci/twofluid_toy/manifest.json
          test -f outputs/ci/twofluid_toy/report.md
          test -f outputs/ci/twofluid_toy/figures/flux_final.png
          test -f outputs/ci/twofluid_toy/figures/flux_movie.gif
          test -f outputs/ci/plugin_demo/manifest.json
          test -f outputs/ci/plugin_demo/report.md
          test -f outputs/ci/plugin_demo/figures/flux_final.png
          test -f outputs/ci/plugin_demo/figures/flux_movie.gif
          test -f outputs/ci/plugin_demo/figures/diagnostics/final_flux_l2_history.png
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: mhx-fast-artifacts
          path: outputs/ci
