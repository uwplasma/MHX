name: Benchmark Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/mhx/**"
      - "examples/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/benchmark-smoke.yml"
  push:
    branches: [main]
    paths:
      - "src/mhx/**"
      - "examples/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/benchmark-smoke.yml"

permissions:
  contents: read

jobs:
  smoke:
    name: FAST benchmark artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run focused benchmark smoke suite
        run: |
          mhx benchmark decay --outdir outputs/benchmark_smoke/resistive_decay
          mhx benchmark orszag-tang --outdir outputs/benchmark_smoke/orszag_tang --nx 16 --ny 16 --t-end 1.0 --save-every 2
          mhx benchmark decaying-turbulence --outdir outputs/benchmark_smoke/decaying_turbulence --nx 16 --ny 16 --t-end 0.5 --save-every 2
          mhx benchmark forced-turbulent-reconnection --outdir outputs/benchmark_smoke/forced_turbulent_reconnection --nx 16 --ny 16 --t-end 0.5 --save-every 2 --seed 1
          mhx artifact-manifest outputs/benchmark_smoke
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mhx-benchmark-smoke
          path: outputs/benchmark_smoke
          if-no-files-found: error
