name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Smoke install built wheel
        run: |
          python -m venv /tmp/mhx-wheel-smoke
          /tmp/mhx-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/mhx-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/mhx-wheel-smoke/bin/python -c "import mhx; print(mhx.__version__)"
          /tmp/mhx-wheel-smoke/bin/mhx --help
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: mhx-dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: mhx-dist
          path: dist
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@v1.13.0
