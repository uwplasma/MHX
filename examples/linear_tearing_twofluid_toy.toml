name = "linear_tearing_twofluid_toy_smoke"
output_dir = "outputs/linear_tearing_twofluid_toy_smoke"

[mesh]
shape = [32, 32]
lower = [0.0, 0.0]
upper = [6.283185307179586, 6.283185307179586]
periodic = [true, true]

[time]
t0 = 0.0
t1 = 0.1
dt = 0.01
save_every = 1

[physics]
model = "reduced_mhd_linear_tearing"
equilibrium = "cosine_tearing"
resistivity = 0.001
viscosity = 0.001
rhs_terms = ["electron_pressure_tensor", "toy_hall_ohm"]

[physics.equilibrium_parameters]
perturbation_amplitude = 0.001

[physics.term_parameters.electron_pressure_tensor]
chi_x = 1e-5
chi_y = 2e-5

[physics.term_parameters.toy_hall_ohm]
ion_skin_depth = 0.01

[numerics]
method = "spectral"
enable_x64 = true
enable_jit = true

[diagnostics]
quantities = ["energy", "mode_growth", "divergence_error"]
mode = [1, 1]
fit_time_window = [0.02, 0.1]
