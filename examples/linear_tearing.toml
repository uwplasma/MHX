name = "linear_tearing_smoke"
output_dir = "outputs/linear_tearing_smoke"

[mesh]
shape = [32, 32]
lower = [0.0, 0.0]
upper = [6.283185307179586, 6.283185307179586]
periodic = [true, true]

[time]
t0 = 0.0
t1 = 0.1
dt = 0.01
save_every = 10

[physics]
model = "reduced_mhd_linear_tearing"
resistivity = 0.001
viscosity = 0.001

[numerics]
method = "spectral"
enable_x64 = true
enable_jit = true

[diagnostics]
quantities = ["energy", "divergence_error"]
