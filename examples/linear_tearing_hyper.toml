name = "linear_tearing_hyper_smoke"
output_dir = "outputs/linear_tearing_hyper_smoke"

[mesh]
shape = [32, 32]
lower = [0.0, 0.0]
upper = [6.283185307179586, 6.283185307179586]
periodic = [true, true]

[time]
t0 = 0.0
t1 = 0.1
dt = 0.01
save_every = 1

[physics]
model = "reduced_mhd_linear_tearing"
equilibrium = "cosine_tearing"
resistivity = 0.001
viscosity = 0.001
rhs_terms = ["hyper_resistivity", "vorticity_drag"]

[physics.equilibrium_parameters]
perturbation_amplitude = 0.001

[physics.term_parameters.hyper_resistivity]
eta4 = 1e-5
nu4 = 1e-5

[physics.term_parameters.vorticity_drag]
rate = 0.01

[numerics]
method = "spectral"
enable_x64 = true
enable_jit = true

[diagnostics]
quantities = ["energy", "divergence_error"]
mode = [1, 1]
fit_time_window = [0.02, 0.1]
